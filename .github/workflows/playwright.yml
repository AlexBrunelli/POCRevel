# ═══════════════════════════════════════════════════════════════════
# Playwright E2E Tests - POC Reporting (HTML vs Allure)
# ═══════════════════════════════════════════════════════════════════

name: Playwright E2E Tests

on:
  workflow_dispatch:
    inputs:
      testFile:
        description: 'Archivo de test a ejecutar'
        required: false
        default: '(todos)'
        type: choice
        options:
          - (todos)
          - tests/flujoA_steps.spec.ts
          - tests/flujoB_steps.spec.ts
          - tests/allure/allure-flujoA.spec.ts
          - tests/allure/allure-flujoB.spec.ts

      tag:
        description: 'Tag de test a ejecutar'
        required: false
        default: '(ninguno)'
        type: choice
        options:
          - (ninguno)
          - @positive
          - @negative
          - @brand
          - @transmission
          - @type
          - @combinado

      reporter:
        description: 'Tipo de reporte'
        required: true
        default: 'both'
        type: choice
        options:
          - html
          - allure
          - both

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: |
          FILE="${{ inputs.testFile }}"
          TAG="${{ inputs.tag }}"
          REPORTER="${{ inputs.reporter }}"

          rm -rf allure-results allure-report playwright-report

          if [ "$REPORTER" == "html" ]; then
            BASE_PATH="tests"
            echo "HTML → tests/"
          elif [ "$REPORTER" == "allure" ]; then
            BASE_PATH="tests/allure"
            echo "ALLURE → tests/allure/"
          else
            BASE_PATH="tests"
            echo "BOTH → todos los tests"
          fi

          CMD="npx playwright test $BASE_PATH"

          if [ "$FILE" != "(todos)" ]; then
            CMD="$CMD $FILE"
            echo "Archivo: $FILE"
          fi

          if [ "$TAG" != "(ninguno)" ]; then
            CMD="$CMD --grep \"$TAG\""
            echo "Tag: $TAG"
          fi

          CMD="$CMD --reporter=line,html --retries=2 --trace=on-first-retry"

          echo "Ejecutando: $CMD"
          eval $CMD

      - name: Generate Allure Report
        if: ${{ inputs.reporter == 'allure' || inputs.reporter == 'both' }}
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results)" ]; then
            npm run allure:generate
          else
            echo "No hay resultados de Allure"
          fi

      - name: Upload HTML Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Report
        if: ${{ inputs.reporter == 'allure' || inputs.reporter == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30